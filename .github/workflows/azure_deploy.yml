name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - uses: actions/checkout@v4

      # 2. Set up Docker Buildx for faster/better builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log into your Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # 4. Build the image and push it to the registry
      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We tag the image with the unique GitHub commit hash so we always know exactly what code is running
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/studentperformance:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build # Wait for the build job to finish before deploying

    steps:
      # 5. Tell the Azure Web App to pull and run the new image we just pushed
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/studentperformance:${{ github.sha }}
